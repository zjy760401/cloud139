name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: cloud139-windows-x86_64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cloud139-linux-x86_64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: cloud139-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: cloud139-macos-arm64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust crates
        uses: swatinem/rust-cache@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: powershell -Command "Compress-Archive -Path target/${{ matrix.target }}/release/cloud139.exe -DestinationPath ${{ matrix.artifact_name }}"

      - name: Create artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: tar -czf ${{ matrix.artifact_name }} -C target/${{ matrix.target }}/release cloud139

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
